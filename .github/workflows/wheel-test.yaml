name: Wheel Tester
on:
  push:
    branches:
      - master
  schedule:
    # Run nightly
    - cron: '0 0 * * *'

jobs:
  ubuntu_wheel_test:
    runs-on: [self-hosted, linux, ARM64, m6g]
    name: "Test Python Wheels"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean up orphaned containers and images
        run: |
          docker container prune -f
          docker image prune -f
          docker builder prune -f

      - name: Setup or update test containers
        run: test/setup-containers.sh

      - name: Execute tests and generate report
        run: |
          docker run -i --rm \
          -u $(id -u) \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v $(pwd)/test:/io \
          -v $(pwd):/repo \
          --env WORK_PATH=$(realpath test) \
          wheel-tester/testhost python3 /io/test-packages.py \
                     --results-branch origin/gh-pages \
                     --repo-path /repo

      - name: Copy results for gh-pages
        run: |
          mkdir -p test/build/results
          cp test/results/results-*.json test/build/results/

      - name: Upload report to github pages
        uses: JamesIves/github-pages-deploy-action@4.1.5
        with:
          branch: gh-pages
          folder: test/build
          clean-exclude: |
            results/*
